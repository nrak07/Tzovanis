* {

}


#top {
    background-color: rgb(33,61,47);

    padding: 10px 20px;

#main {

.kr {
    margin-top: 10px;
    padding: 10px 15px;
    font-size: 18px;
    color: white;
    background-color: black;
    border: 3px solid black;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.kr:hover {
    background-color: white;
    color: black;
}


.slider {
    width: 90%;
    max-width: 500px;
    aspect-ratio: 1;
    overflow: hidden;
    margin: 20px auto;
    position: relative;
}

.slider img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    animation: slide 12s infinite;
}

.slider img:nth-child(1) { animation-delay: 0s; }
.slider img:nth-child(2) { animation-delay: 4s; }
.slider img:nth-child(3) { animation-delay: 8s; }
.slider img:nth-child(4) { animation-delay: 12s; }
.slider img:nth-child(5) { animation-delay: 16s; }

@keyframes slide {
    0% { opacity: 0; }
    8% { opacity: 1; }
    33% { opacity: 1; }
    41% { opacity: 0; }
    100% { opacity: 0; }
}
#bottom {
    background-color: rgb(33,61,47);
    color: white;
    width: 100%;
    text-align: center;
    padding: 30px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#bottom h1 {
    margin-bottom: 15px;
}

#address, #bottom a {
    color: white;
    text-decoration: none;
    word-break: break-word;
    margin-bottom: 10px;
}

.social-icons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
    
}

.social-icons img {
    width: 40px;
    height: 40px;
    border-radius: 13px;
    cursor: pointer;
    transition: 0.3s;
}
#insta{
    background-color: rgb(193, 38, 193);
    border: 0px solid black;
}
#fb{
    background-color: blue;
    border: 3.5px solid black;
}
.social-icons img:hover {
    transform: scale(1.1);
}

@media (max-width: 768px) {
    #bigger {
        font-size: 24px;
    }

    #kr {
        font-size: 16px;
        padding: 8px 12px;
    }

    .slider {
        width: 95%;
        max-width: 400px;
        aspect-ratio: 1;
    }
}

@media (max-width: 480px) {
    #welcome {
        font-size: 16px;
    }

    #bigger {
        font-size: 20px;
    }

        width: 100%;
        max-width: 300px;
    }

    #bottom {
        padding: 20px 10px;
    }

    #bottom h1 {
        font-size: 18px;
    }

    .social-icons img {
        width: 35px;
        height: 35px;
    }
}
.imagess{ 
  display:flex;
  gap:10px;
}
